<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulátor Križovatky</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="panel">
            <h2>Ovládanie simulácie</h2>

            <div class="form-group">
                <label for="configSelect">Vyberte konfiguráciu:</label>
                <select id="configSelect">
                    <option value="">Načítavam...</option>
                </select>
            </div>

            <hr>
            <h3>Parametre premávky</h3>

            <div class="form-group">
                <label>Intenzita (0-100):</label>
                <div class="intensity-inputs">
                    <input
                        type="number"
                        id="intNorth"
                        value="50"
                        min="0"
                        max="100"
                        placeholder="Sever"
                    >
                    <input
                        type="number"
                        id="intSouth"
                        value="50"
                        min="0"
                        max="100"
                        placeholder="Juh"
                    >
                    <input
                        type="number"
                        id="intEast"
                        value="30"
                        min="0"
                        max="100"
                        placeholder="Východ"
                    >
                    <input
                        type="number"
                        id="intWest"
                        value="30"
                        min="0"
                        max="100"
                        placeholder="Západ"
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="simDuration">Trvanie simulácie (s):</label>
                <input
                    type="number"
                    id="simDuration"
                    value="60"
                    min="10"
                    max="3600"
                >
            </div>

            <div class="button-group">
                <button id="startBtn" class="btn-primary">Spustiť</button>
                <button id="stopBtn" class="btn-danger" disabled>Stop</button>
                <button id="resetBtn" class="btn-secondary" disabled>Reset</button>
            </div>

            <div id="statusBox" class="status disconnected">
                Stav: Odpojené
            </div>
        </div>

        <div id="visualization-container">
            <div class="canvas-wrapper">
                <canvas id="simCanvas" width="700" height="700"></canvas>
            </div>

            <div class="stats-panel">
                <h3>Štatistiky (Čas: <span id="statTime">0.0</span>s)</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        Vygenerované: <span id="statGenerated">0</span>
                    </div>
                    <div class="stat-item">
                        Prejdené: <span id="statPassed">0</span>
                    </div>
                    <div class="stat-item">
                        Čakajúce: <span id="statWaiting">0</span>
                    </div>
                    <div class="stat-item">
                        Rad (S, J, V, Z): <span id="statQueue">0, 0, 0, 0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
